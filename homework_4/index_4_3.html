<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>


    <script>
        // 4.3 Основне завдання, cтворити скрипт яки повинен виконувати наступне:
        //     запитати у користувача рік народження;
        // запитати в нього, в якому місті він живе;
        // запитати його улюблений вид спорту.
        // При натисканні на ОК показуємо вікно, де має бути відображена наступна інформація:

        //     його вік;
        // якщо користувач вкаже Київ, Вашингтон чи Лондон, то показати йому повідомлення - "Ти живеш у столиці..."
        // і на місце точок підставляємо країну, столицею якої є місто.Інакше показуємо йому“ ти живеш у місті…”,
        //     де місце точок– введене місто.
        // Додаткове завдання *
        //     Вибираємо самі три види спорту та три чемпіони у цих видах.Відповідно,
        //     якщо користувач вкаже один із цих видів спорту, то показуємо йому повідомлення“ Круто!Хочеш стати… ?
        //     і підставляємо на місце точок ім 'я та прізвище чемпіона.

        // Все це має бути відображено в одному вікні(алерті).

        // Додаткове завдання
        // Якщо в якомусь випадку він не захоче вводити інформацію і натисне Скасувати, показати йому повідомлення–“ Шкода,
        // що Ви не захотіли ввести свій(ю)…” і вказуємо, що він не захотів вводити– дату народження, місто чи вид спорту.


        let year = prompt('Вкажіть рік народження');

        if (year == null) {
            alert("Шкода, що Ви не захотіли ввести свій рік народження");
        } else {
            let city = prompt('В якому місті Ви живете?');
            if (city == null) {

                alert("Шкода, що Ви не захотіли ввести свіє місто проживання");
            } else {
                let sport = prompt('Який Ваш улюблений вид спорту?');
                if (sport == null) {

                    alert("Шкода, що Ви не захотіли ввести свій улюблений вид спорту");
                } else {

                    let dateOfBirth = 2026 - (+year);
                    let yourCity = "";
                    let yourSport = "";
                    if (city.toLowerCase() == "київ") {
                        yourCity = "Ти живеш у столиці України";
                    } else if (city.toLowerCase() == "вашингтон") {
                        yourCity = "Ти живеш у столиці США";
                    } else if (city.toLowerCase() == "лондон") {
                        yourCity = "Ти живеш у столиці Англії";
                    } else {
                        yourCity = `Ти живеш у місті ${city}`;
                    }

                    if (sport.toLowerCase() === "футбол") {
                        yourSport = "Круто! Хочеш стати Ліонелем Мессі?";
                    } else if (sport.toLowerCase() === "бокс") {
                        yourSport = "Круто! Хочеш стати Олександром Усиком?";
                    } else if (sport.toLowerCase() === "теніс") {
                        yourSport = "Круто! Хочеш стати Новаком Джоковичем?";
                    } else {
                        yourSport = `Твый улюблений вид спорту ${sport}`;
                    }
                    alert(`Ваш рік народження ${dateOfBirth}
            ${yourCity}
            ${yourSport}`);
                }
            }
        }
    </script>

</body>

</html>
