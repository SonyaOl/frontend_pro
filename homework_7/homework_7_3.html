    <script>
        // 7.3 Реалізуйте функцію removeElement(array, item), щоб видалити елемент item з масиву array.

        //Наприклад:

        const array = [1, 3, 4, 6, 2, 5, 7];

        function removeElement(array, item) {
            let data = [];
            let index = 0;
            for (let i = 0; i < array.length; i++) {
                if (array[i] != item) {

                    data[index] = array[i];
                    index++

                }
            }
            return data;

            // return array.filter((x, index) => array[index] != item);
        }

        removeElement(array, 7);
    </script>
