<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <img alt="">


    <script>
        //Покласти в папку будь-які зображення 1.jpg, 2.jpg, 3.jpg, 4.jpg, 5.jpg, 6.jpg, 7.jpg, 8.jpg, 9.jpg. Вивести зображення, отримане випадковим чином (Math.random)
        let picture = Math.floor(Math.random() * 4) + 1;
        let img = document.querySelector('img');
        img.setAttribute('src', `img/${picture}.jpg`);
    </script>

</body>

</html>
