<!DOCTYPE html>

<body>


    <script>
        // 9 Створити ladder (сходи) – об'єкт, який дозволяє підніматися вгору та спускатися:
        let ladder = {
            count: 0,
            up: function () {
                this.count++
                return this; // підніматиме вас на одну сходинку
            },
            down: function () {
                this.count--
                return this; // опускатиме вас на одну сходинку
            },
            showStep: function () {
                return this; // показує поточну сходинку
            }
        };

        ladder.up().up().down().showStep(); //1
    </script>

</body>

</html>
