<!DOCTYPE html>
<html lang="en">

<head>

<body>


    <script>
        // 5.3 Дано ціле число N (ввести через prompt). Вивести всі цілі числа від 1 до 100, квадрат яких не перевищує числа N

        let N = +prompt("Введіть число");
        let result = "";
        for (let i = 1; i <= 100; i++) {
            if ((i * i) > N) {
                break;
            } else {
                result = result + i + " ";

            }
        }
        console.log(result);
    </script>

</body>
