<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script>
        // 8.3 Цикл на кожній ітерації пропонує через prompt ввести число більше 100 (але максимум 10 ітерацій циклу) . Якщо відвідувач ввів число менше ста – попросити ввести ще раз, і таке інше. Якщо користувач вводить більше ста, текст або цикл закінчує всі ітерації, то функція виводить в консоль останній введення користувача і завершує функцію.
        let value = +prompt("Введіть число більше 100");

        function getNum(value) {
            let data = +value;
            for (let i = 1; i <= 10; i++) {

                if (data <= 100) {
                    alert("Ви ввели невірне число");
                } else {
                    return data;
                    break;
                }

            }
        }

        getNum(prompt("Введіть число більше 100"));
    </script>

</body>

</html>
