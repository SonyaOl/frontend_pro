<!DOCTYPE html>

<body>


    <script>
        // 8.2 Створити функцію для розрахунку добутку двох чисел, що викликається так: name(5)(2). Функція повинна повертати результат (у середині функції не має бути консоль лога!)

        function name(a) {
            return function (b) {
                return a * b;
            }
        }

        name(5)(2);
    </script>

</body>
